name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: install python
        run: uv python install 3.11

      - name: install system dependencies (linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: sync dependencies
        run: uv sync --frozen --extra package

      - name: build
        run: uv run pyinstaller packaging/shottrainer.spec --noconfirm

      - name: archive (linux/macos)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          tar -czf ShotTrainer-${{ runner.os }}.tar.gz ShotTrainer

      - name: archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ShotTrainer -DestinationPath dist/ShotTrainer-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: shottrainer-${{ runner.os }}
          path: dist/ShotTrainer-*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: collect artefacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          ls -la release

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
