site_name: ShotTrainer
site_description: Open-source optical shooting trainer with camera tracking and audio shot detection.
site_url: https://dsgnr.github.io/ShotTrainer/
repo_url: https://github.com/dsgnr/ShotTrainer
repo_name: dsgnr/ShotTrainer

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

docs_dir: docs

nav:
  - Home: index.md
  - Setup and camera alignment: setup.md
  - How tracking works: how-tracking-works.md
  - Accuracy and target sizing: accuracy.md
  - Cameras tested:
      - Overview: cameras.md
      - Submission template: cameras/template.md
  - Federation targets: provided-targets.md
  - Calibration: calibration.md
  - Architecture: architecture.md
  - Engineering notes: engineering-notes.md
  - Troubleshooting: troubleshooting.md
  - Releases: releases.md

not_in_nav: |
  cameras/images/README.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/mermaid-init.js
