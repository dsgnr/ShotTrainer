name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release name (e.g. 0.4.0, 0.4.0-rc1). A tag v<name> will be created."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: install python
        run: uv python install 3.13

      - name: install system dependencies (linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: sync dependencies
        run: uv sync --frozen --extra package

      - name: build icns (macos)
        if: runner.os == 'macOS'
        shell: bash
        run: bash packaging/build_icns.sh

      - name: build
        run: uv run --extra package python packaging/build_nuitka.py

      - name: build dmg (macos)
        if: runner.os == 'macOS'
        shell: bash
        run: bash packaging/make_dmg.sh

      - name: install Inno Setup (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: build installer (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh packaging/make_installer.ps1

      - name: archive (windows portable)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/ShotTrainer -DestinationPath dist/ShotTrainer-Windows.zip

      - name: archive (linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          tar -czf ShotTrainer-Linux.tar.gz ShotTrainer

      - name: archive (macos)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # The .dmg is the user-facing artefact. The raw folder build
          # is kept as a tarball for users who prefer to run unsigned.
          cd dist
          tar -czf ShotTrainer-macOS.tar.gz ShotTrainer

      - uses: actions/upload-artifact@v4
        with:
          name: shottrainer-${{ runner.os }}
          path: |
            dist/ShotTrainer-*.tar.gz
            dist/ShotTrainer-*.zip
            dist/ShotTrainer-*.dmg
            dist/ShotTrainer-Setup.exe
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: create tag from input (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ inputs.release_name }}"
          git push origin "v${{ inputs.release_name }}"

      - name: determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=v${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ contains(inputs.release_name, '-') }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ contains(github.ref_name, '-') }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: collect artefacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
              -name '*.tar.gz' -o \
              -name '*.zip' -o \
              -name '*.dmg' -o \
              -name 'ShotTrainer-Setup.exe' \
            \) -exec cp {} release/ \;
          ls -la release

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: release/*
          generate_release_notes: true
