# Zensical configuration for the ShotTrainer documentation site.
#
# Migrated from mkdocs.yml. The `classic` theme variant preserves the look
# and feel of Material for MkDocs, which the previous build used.

[project]
site_name = "ShotTrainer"
site_description = "Open-source optical shooting trainer with camera tracking and audio shot detection."
site_url = "https://dsgnr.github.io/ShotTrainer/"
repo_url = "https://github.com/dsgnr/ShotTrainer"
repo_name = "dsgnr/ShotTrainer"
docs_dir = "docs"

extra_javascript = [
    "https://unpkg.com/mermaid@10/dist/mermaid.min.js",
    "assets/mermaid-init.js",
]

extra_css = [
    "stylesheets/site.css",
    "stylesheets/landing.css",
]

nav = [
    { "Home" = "index.md" },
    { "User guide" = [
        "installation.md",
        "getting-started.md",
        "setup.md",
        "sessions.md",
        "replay.md",
        "session-browser.md",
        "stats.md",
        "audio-setup.md",
        "scoring.md",
        "printing-targets.md",
        "preferences.md",
        "shortcuts.md",
        "how-tracking-works.md",
        "accuracy.md",
        "calibration.md",
        "provided-targets.md",
        "troubleshooting.md",
    ] },
    { "Cameras" = [
        "cameras.md",
        { "Camera models" = [
            "cameras/arducam-ov9281.md",
        ] },
        "cameras/template.md",
    ] },
    { "Reference" = [
        "architecture.md",
        "engineering-notes.md",
    ] },
    { "Releases" = "releases.md" },
]

[project.theme]
logo = "assets/img/icon.svg"
favicon = "assets/img/icon.ico"
variant = "modern"
custom_dir = "overrides"
features = [
    "navigation.instant",
    "navigation.sections",
    "content.code.copy",
]

# Match prefers-color-scheme so the site picks up the user's system theme,
# the same behaviour the previous Material for MkDocs config provided.
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "blue"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.toc]
permalink = true
